{% extends 'base.html' %}

{% block title %}
Results
{% endblock %}

{% block content %}

<h2>Result List</h2>

<table>
    <thead>
        <tr>
            <th>Result ID</th>
            <th>Student</th>
            <th>Exam</th>
            <th>Score</th>
        </tr>
    </thead>

    <tbody>
        {% for result in results %}
        <tr>
            <td>{{ result.result_id }}</td>
            <td>{{ result.student.name }}</td>
            <td>{{ result.exam.exam_name }}</td>
            <td>{{ result.score }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
