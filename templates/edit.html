{% extends 'base.html' %}
{% block content %}
<form action="{{ url_for('edit_student', id=student.student_id) }}" method="POST">
    <label for="stdname"> Student Name </label>
        <input type="text" name="name"  value="{{ student.name }}"> 

    <label for="email">Email</label>
         <input type="email" name="email" value="{{ student.email }}">

    <label>Mobile</label>
        <input type="text" name="mobile" value="{{ student.mobile }}">


    <label >Gender</label>     
    <input type="radio" name="gender" value="Male"

        {% if student.gender=="Male" %} 
            checked
        {% endif %} ><span style="font-weight: bold;">Male</span>


       
    <input type="radio" name="gender" value="Female"

        {% if student.gender=="Female" %} 
            checked
        {% endif %} > <span style="font-weight: bold;">Female</span>

    <label>Address</label>
        <input type="text" name="address" value="{{ student.address }}">

    <label>Birthday</label>
        <input type="date" name="birthday" value="{{ student.birthday }}">
       
    <button type="submit">Edit Student</button>   
</form>
{% endblock %}
