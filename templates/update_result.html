{% extends "base.html" %}

{% block content %}

<h2>Result List</h2>

<a href="{{ url_for('add_result') }}">

Add Result

</a>

<table>

<tr>

<th>ID</th>

<th>Student</th>

<th>Exam</th>

<th>Score</th>

<th>Actions</th>

</tr>

{% for result in results %}

<tr>

<td>{{ result.result_id }}</td>

<td>{{ result.student.name }}</td>

<td>{{ result.exam.exam_name }}</td>

<td>{{ result.score }}</td>

<td>

<a href="{{ url_for('edit_result',id=result.result_id) }}">

Edit

</a>

|

<a href="{{ url_for('delete_result',id=result.result_id) }}"
onclick="return confirm('Delete this result?')">

Delete

</a>

</td>

</tr>

{% endfor %}

</table>

{% endblock %}
