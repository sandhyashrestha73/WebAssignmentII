{% extends "base.html" %}

{% block content %}

<h2>Add Exam</h2>

<form method="POST">

    <label>Exam Name</label>

    <input
        type="text" name="exam_name" required>
    
    <label>Exam Date & Time</label>
        <input type="datetime-local" name="exam_date" required> 

    <button type="submit">
        Add Exam
    </button>

</form>

{% endblock %}
