{% extends 'base.html' %}

{% block title %}
Exams
{% endblock %}

{% block content %}

<h2>Exam List</h2>

<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Exam Name</th>
            <th>Exam Date</th>
        </tr>
    </thead>

    <tbody>
        {% for exam in exams %}
        <tr>
            <td>{{ exam.exam_id }}</td>
            <td>{{ exam.exam_name }}</td>
            <td>{{ exam.exam_date }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
